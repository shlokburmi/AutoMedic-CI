name: AutoMedic CI

on: [push]

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Install dependencies
      - name: Install dependencies
        run: pip install pytest groq

      # Run tests and capture logs
      - name: Run tests and capture output
        run: |
          pytest > result.txt || true

      # Run AI Fix
      - name: Run AI Fix
        run: python fix_code.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      # Commit changes (if any)
      - name: Commit changes
        run: |
          git config --global user.name "AutoMedic Bot"
          git config --global user.email "bot@automedic.com"
          git add .
          git commit -m " AutoMedic AI Fix" || echo "No changes"

      # PR Creation
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "AutoMedic AI Fix"
          title: "AutoMedic Fix: Automated Code Repair"
          body: |
            This PR was automatically generated by AutoMedic CI.

            ✅ Detected failing tests  
            🤖 Applied AI-generated fix  
            🔁 Ready for review  

          branch: automedic-fix-${{ github.run_id }}
