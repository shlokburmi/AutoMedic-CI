name: AutoMedic CI

on: [push]

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Install dependencies
      - name: Install dependencies
        run: pip install pytest groq

      # Run tests (capture failure but don't stop)
      - name: Run tests
        id: test_step
        run: |
          pytest > result.txt
        continue-on-error: true

      # Run AI fix ONLY if tests fail
      - name: Run AI Fix
        if: failure()
        run: python fix_code.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      # Re-run tests after fix
      - name: Re-run tests
        if: failure()
        run: pytest

      # Commit changes if fix worked
      - name: Commit changes
        if: failure()
        run: |
          git config --global user.name "AutoMedic Bot"
          git config --global user.email "bot@automedic.com"
          git add .
          git commit -m "🤖 AutoMedic AI Fix" || echo "No changes"

      # Create / Update PR (single branch)
      - name: Create Pull Request
        if: failure()
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "🤖 AutoMedic AI Fix"
          title: "🤖 AutoMedic Fix: Automated Code Repair"
          body: |
            This PR was automatically generated by AutoMedic CI.

            ✅ Tests failed and were fixed  
            🤖 AI generated a correction  
            🔁 Tests re-run after fix  

          branch: automedic-fix